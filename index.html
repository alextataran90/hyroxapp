<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hyrox" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>Hyrox Trainer</title>
</head>
<body>
  <header id="topbar">
    <div id="topbar-left">
      <span id="phase-chip"></span>
      <span id="week-chip"></span>
    </div>
    <div id="topbar-right">
      <span id="countdown"></span>
      <a href="#/settings" class="topbar-settings-link" id="settings-nav-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
    </div>
  </header>
  <div id="pr-toast" hidden></div>
  <div id="timer-pill" hidden></div>
  <main id="app"></main>
  <div id="update-banner" hidden>
    <span>New plan available</span>
    <div style="display:flex;gap:6px;align-items:center">
      <button id="dismiss-btn" aria-label="Dismiss"
        onclick="const b=this.closest('#update-banner');b.hidden=true;try{const v=b.dataset.version;if(v)localStorage.setItem('hyrox.app.version',v)}catch(e){}">×</button>
      <button id="update-btn"
        onclick="(async()=>{const b=this.closest('#update-banner');b.hidden=true;try{const v=b.dataset.version;if(v)localStorage.setItem('hyrox.app.version',v)}catch(e){};if('serviceWorker' in navigator){try{const r=await navigator.serviceWorker.getRegistrations();for(const x of r)await x.unregister();}catch(e){};if(window.caches){try{const k=await caches.keys();for(const c of k)await caches.delete(c);}catch(e){}}};location.replace(location.pathname+'?v='+Date.now()+location.hash)})()">Reload</button>
    </div>
  </div>
  <!-- config.js is gitignored; silently absent on GitHub Pages -->
  <script>
    (function() {
      var s = document.createElement("script");
      s.src = "config.js";
      document.head.appendChild(s);
    })();
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
